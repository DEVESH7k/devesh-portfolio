version: 0.2
env:
  variables:
    MEDIUM_USERNAME: "deveshkhatik007"
  parameter-store:
    CLOUDFRONT_DISTRIBUTION_ID: "/portfolio/cloudfront_distribution_id"
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing dependencies ==="
      - npm ci
  build:
    commands:
      - echo "=== Syncing Medium RSS + building ==="
      - node scripts/sync-content.js
      - echo "=== Copying resume to dist ==="
      - cp resume.pdf dist/resume.pdf
      - echo "=== Build complete ==="
      - ls -lh dist/
  post_build:
    commands:
      - echo "=== Syncing to S3 ==="
      - aws s3 sync dist/ s3://$S3_BUCKET_NAME/ --delete --cache-control "public, max-age=300"
      - echo "=== Invalidating CloudFront cache ==="
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
      - echo "=== Deploy complete! ==="
artifacts:
  files:
    - dist/**/*
  discard-paths: no
cache:
  paths:
    - node_modules/**/*
